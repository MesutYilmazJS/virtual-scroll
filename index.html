<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanal Kaydırma (Premium)</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Premium Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Abstract Background -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <main class="app-layout">
      <!-- Sidebar / Settings -->
      <aside class="sidebar glass-panel">
        <header class="sidebar-header">
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            <h1>Sanal Kaydırma</h1>
          </div>
          <p class="subtitle">Yüksek performanslı ızgara (grid) altyapısı</p>
        </header>

        <form id="config-form" class="controls">
          <div class="input-group">
            <label for="itemWidth">Eleman Genişliği (px)</label>
            <input type="number" id="itemWidth" value="320" required />
          </div>
          <div class="input-group">
            <label for="itemHeight">Eleman Yüksekliği (px)</label>
            <input type="number" id="itemHeight" value="220" required />
          </div>
          <div class="input-group">
            <label for="columns">Sütun Sayısı</label>
            <input type="number" id="columns" value="3" required />
          </div>
          <div class="input-group">
            <label for="totalItems">Toplam Eleman</label>
            <input type="number" id="totalItems" value="100000" required />
          </div>
          <button id="submit_btn" type="submit" class="btn-primary">
            <span>Izgara Oluştur</span>
          </button>
        </form>

        <div class="stats-container">
          <div class="stat-box">
            <span class="stat-label">DOM Düğümleri</span>
            <span class="stat-value" id="visible_div">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Görünen Satır</span>
            <span class="stat-value" id="visible_col">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Geçerli Sayfa</span>
            <span class="stat-value" id="page_number">0</span>
          </div>
        </div>
      </aside>

      <!-- Scroll Viewport -->
      <section class="scroll-section">
        <div id="container" class="scroll-container glass-panel">
          <div id="spacer"></div>
        </div>
      </section>
    </main>

    <script src="index.js"></script>
    <script>
      const spacer = document.getElementById("spacer");
      const container = document.getElementById("container");
      const submitBtn = document.getElementById("submit_btn");

      submitBtn.addEventListener("click", (e) => {
        e.preventDefault();
        
        // If grid exists, clean up and reset
        if (window.grid) {
          container.querySelectorAll(".item").forEach(el => el.remove());
          container.scrollTo(0, 0); // Reset scroll position
        }

        const itemWidth = parseInt(document.getElementById("itemWidth").value);
        const itemHeight = parseInt(document.getElementById("itemHeight").value);
        const columns = parseInt(document.getElementById("columns").value);
        const totalItems = parseInt(document.getElementById("totalItems").value);
        
        // Initialize the new VirtualGrid
        window.grid = new VirtualGrid({
          containerId: "container",
          containerWidth: container.clientWidth,
          containerHeight: container.clientHeight,
          itemWidth: itemWidth,
          itemHeight: itemHeight,
          columns: columns,
          totalItems: totalItems,
          gap: 24, // Consistent spacing
        });
        
        // Change button text
        submitBtn.querySelector('span').textContent = 'Sıfırla ve Yeniden Oluştur';
      });
      
      // Auto-trigger on load
      window.addEventListener('DOMContentLoaded', () => {
        submitBtn.click();
      });
    </script>
  </body>
</html>
