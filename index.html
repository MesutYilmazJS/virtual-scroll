<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanal Kaydırma Full-Stack (Premium)</title>
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Premium Styles -->
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Add a small notification system for API feedback */
    #api_status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #38ef7d;
      font-weight: 500;
      text-align: center;
      min-height: 20px;
    }
    .status-error { color: #ff4b2b !important; }
    .status-loading { color: #f5af19 !important; }
  </style>
</head>

<body>
  <!-- Abstract Background -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <main class="app-layout">
    <!-- Sidebar / Settings -->
    <aside class="sidebar glass-panel">
      <header class="sidebar-header">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
          <h1>API Kaydırma</h1>
        </div>
        <p class="subtitle">PostgreSQL + Node.js (Cursor Pagination)</p>
      </header>

      <form id="config-form" class="controls">
        <div class="input-group">
          <label for="apiUrl">API Endpoint (Backend)</label>
          <input type="text" id="apiUrl" value="http://localhost:3000/items" required />
        </div>
        <div class="input-group">
          <label for="itemWidth">Eleman Genişliği (px)</label>
          <input type="number" id="itemWidth" value="320" required />
        </div>
        <div class="input-group">
          <label for="itemHeight">Eleman Yüksekliği (px)</label>
          <input type="number" id="itemHeight" value="220" required />
        </div>
        <div class="input-group">
          <label for="columns">Sütun Sayısı</label>
          <input type="number" id="columns" value="3" required />
        </div>
        <!-- Total Items removed; now depends on infinite loading via backend -->
        <button id="submit_btn" type="submit" class="btn-primary">
          <span>Izgara Oluştur ve Yükle</span>
        </button>
        <div id="api_status"></div>
      </form>

      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">DOM Düğümleri</span>
          <span class="stat-value" id="visible_div">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Yüklenen Veri</span>
          <span class="stat-value" id="data_count">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Durum</span>
          <span class="stat-value" id="status_indicator" style="font-size:0.9rem">Bağlı</span>
        </div>
      </div>
    </aside>

    <!-- Scroll Viewport -->
    <section class="scroll-section">
      <div id="container" class="scroll-container glass-panel">
        <div id="spacer"></div>
      </div>
    </section>
  </main>

  <script src="index.js"></script>
  <script>
    const spacer = document.getElementById("spacer");
    const container = document.getElementById("container");
    const submitBtn = document.getElementById("submit_btn");

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();

      // If grid exists, clean up and reset
      if (window.grid) {
        container.querySelectorAll(".item").forEach(el => el.remove());
        container.scrollTo(0, 0); // Reset scroll position
      }

      const itemWidth = parseInt(document.getElementById("itemWidth").value);
      const itemHeight = parseInt(document.getElementById("itemHeight").value);
      const columns = parseInt(document.getElementById("columns").value);
      const apiUrl = document.getElementById("apiUrl").value;

      document.getElementById('status_indicator').textContent = 'Bağlanıyor..';
      submitBtn.querySelector('span').textContent = 'Sıfırla ve Yeniden Oluştur';

      // Initialize the new VirtualGrid (now asynchronous based)
      window.grid = new VirtualGrid({
        containerId: "container",
        containerWidth: container.clientWidth,
        containerHeight: container.clientHeight,
        itemWidth: itemWidth,
        itemHeight: itemHeight,
        columns: columns,
        gap: 24, // Consistent spacing
        apiUrl: apiUrl
      });
      
      await window.grid.init();
    });

    // Auto-trigger on load
    window.addEventListener('DOMContentLoaded', () => {
      submitBtn.click();
    });
  </script>
</body>

</html>
